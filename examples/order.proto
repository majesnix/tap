syntax = "proto3";

package example;

// Covers: nested messages, repeated fields, oneof, enum.
message Order {
  string          order_id   = 1;
  string          customer_id = 2;
  repeated LineItem items    = 3;
  Address         shipping   = 4;
  OrderStatus     status     = 5;
  Payment         payment    = 6;
}

message LineItem {
  string product_id = 1;
  string name       = 2;
  int32  quantity   = 3;
  double unit_price = 4;
}

message Address {
  string street  = 1;
  string city    = 2;
  string state   = 3;
  string zip     = 4;
  string country = 5;
}

enum OrderStatus {
  ORDER_STATUS_UNSPECIFIED = 0;
  ORDER_STATUS_PENDING     = 1;
  ORDER_STATUS_CONFIRMED   = 2;
  ORDER_STATUS_SHIPPED     = 3;
  ORDER_STATUS_DELIVERED   = 4;
  ORDER_STATUS_CANCELLED   = 5;
}

// oneof — tests the radio-group branch selector in the form.
message Payment {
  oneof method {
    CreditCard  credit_card  = 1;
    BankTransfer bank_transfer = 2;
    string      voucher_code = 3;
  }
}

message CreditCard {
  string last_four = 1;
  string brand     = 2;
  int32  exp_month = 3;
  int32  exp_year  = 4;
}

message BankTransfer {
  string iban     = 1;
  string bic      = 2;
  string holder   = 3;
}
