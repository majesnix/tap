syntax = "proto3";

package example;

// Covers: int64/uint64 (text input), float, double, bytes, fixed32, sfixed64.
// Good for testing the 64-bit text-input path and numeric edge cases.
message SensorReading {
  string  device_id      = 1;
  int64   timestamp_ms   = 2;  // 64-bit — rendered as text input
  uint64  sequence_no    = 3;  // 64-bit unsigned
  float   temperature    = 4;
  double  pressure_pa    = 5;
  bytes   raw_payload    = 6;
  fixed32 checksum       = 7;
  sfixed64 signed_offset = 8;

  SensorType sensor_type = 9;
  repeated Alert alerts  = 10;
}

enum SensorType {
  SENSOR_TYPE_UNSPECIFIED   = 0;
  SENSOR_TYPE_TEMPERATURE   = 1;
  SENSOR_TYPE_PRESSURE      = 2;
  SENSOR_TYPE_HUMIDITY      = 3;
  SENSOR_TYPE_ACCELEROMETER = 4;
}

message Alert {
  string severity = 1;
  string message  = 2;
  int32  code     = 3;
}
