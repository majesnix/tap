# Starts RabbitMQ 4 with Management Plugin for local Proto Sender testing.
# Pre-creates test queues and exchanges so you can publish immediately.
#
# Also starts the echo-service (examples/echo-service) which consumes from
# test-queue and republishes each message to test-queue.reply — lets you test
# the Response Queue Reader tab without needing a real downstream service.
#
# Usage:
#   docker compose up -d                    # start everything
#   docker compose up -d rabbitmq           # RabbitMQ only (no echo service)
#   docker compose logs -f echo-service     # tail echo service logs
#   docker compose down                     # stop (data persists)
#   docker compose down -v                  # stop and wipe all data
#
# Connection profile to enter in Proto Sender:
#   Name:            Local Dev
#   Host:            localhost
#   AMQP Port:       5672
#   Vhost:           /
#   Username:        dev
#   Password:        dev
#   Management Port: 15672
#   Management SSL:  off
#
# Echo service flow:
#   1. Send a proto message to test-queue (via proto-sender Publish tab)
#   2. echo-service relays it to test-queue.reply
#   3. Read from test-queue.reply (via proto-sender Response tab)
#
# Management UI: http://localhost:15672  (dev / dev)

services:
  rabbitmq:
    image: rabbitmq:4-management
    container_name: proto-sender-rabbitmq
    ports:
      - "5672:5672"     # AMQP — app connection
      - "15672:15672"   # Management API + UI
    environment:
      RABBITMQ_DEFAULT_USER: dev
      RABBITMQ_DEFAULT_PASS: dev
    volumes:
      - ./docker/rabbitmq.conf:/etc/rabbitmq/conf.d/99-local.conf:ro
      - ./docker/definitions.json:/etc/rabbitmq/definitions.json:ro
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  echo-service:
    build:
      context: ./examples/echo-service
      dockerfile: Dockerfile
    container_name: proto-sender-echo
    restart: unless-stopped
    environment:
      AMQP_URL: amqp://dev:dev@rabbitmq:5672
      SOURCE_QUEUE: test-queue
      REPLY_QUEUE: test-queue.reply
      POLL_MS: "200"
      RETRY_SECS: "5"
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  rabbitmq_data:
